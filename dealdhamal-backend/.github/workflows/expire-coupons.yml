name: Expire Old Coupons

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  expire:
    name: Mark Expired Coupons
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: dealdhamal-backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dealdhamal-backend

      - name: Run expire coupons job
        run: npx tsx src/jobs/expireCoupons.ts
        working-directory: dealdhamal-backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}
