name: Sync Affiliate Coupons

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: dealdhamal-backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd dealdhamal-backend
          npm ci

      - name: Push Database Schema
        run: |
          cd dealdhamal-backend
          npx drizzle-kit push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Sync Script
        run: |
          cd dealdhamal-backend
          npx tsx src/jobs/syncCoupons.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}
          CUELINKS_API_KEY: ${{ secrets.CUELINKS_API_KEY }}
          VCOMMISSION_API_KEY: ${{ secrets.VCOMMISSION_API_KEY }}
          ADMITAD_CLIENT_ID: ${{ secrets.ADMITAD_CLIENT_ID }}
          ADMITAD_CLIENT_SECRET: ${{ secrets.ADMITAD_CLIENT_SECRET }}
          CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
