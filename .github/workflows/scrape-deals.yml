name: Scrape Public Deals (DISABLED)

on:
  # Scraping disabled — data now comes entirely from affiliate networks
  # (vCommission, Admitad, Cuelinks, CJ) via sync-affiliates.yml
  # Re-enable the line below to resume scraping:
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: dealdhamal-backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd dealdhamal-backend
          npm ci

      - name: Push Database Schema
        run: |
          cd dealdhamal-backend
          npx drizzle-kit push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Scraper Script
        run: |
          cd dealdhamal-backend
          npx tsx src/jobs/scrapePublicDeals.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}
