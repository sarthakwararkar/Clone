name = "coupondunia-backend"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "coupondunia-assets"

[vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put <NAME>`):
# DATABASE_URL
# SUPABASE_URL
# SUPABASE_JWT_SECRET
# UPSTASH_REDIS_URL
# UPSTASH_REDIS_TOKEN
# RESEND_API_KEY
# SENTRY_DSN
# R2_PUBLIC_URL
