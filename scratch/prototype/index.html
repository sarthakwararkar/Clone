      const currentTabBtn = document.getElementById(`tab-${activeCategory}`);
      currentTabBtn.classList.remove('bg-white/10', 'text-white', 'shadow-sm');
      currentTabBtn.classList.add('hover:bg-white/5', 'text-gray-400');

      // Add active styling to new tab
      const newTabBtn = document.getElementById(`tab-${tabKey}`);
      newTabBtn.classList.remove('hover:bg-white/5', 'text-gray-400');
      newTabBtn.classList.add('bg-white/10', 'text-white', 'shadow-sm');

      activeCategory = tabKey;
      loadCategory(tabKey);
    }

    // Scroll container programmatically
    function scrollSlider(direction) {
      const container = document.getElementById('cards-container');
      const cardWidth = 320; // estimate size of one card + gap
      if (direction === 'left') {
        container.scrollBy({ left: -cardWidth, behavior: 'smooth' });
      } else {
        container.scrollBy({ left: cardWidth, behavior: 'smooth' });
      }
    }

    // Modal control
    function openModal(itemId) {
      const category = categoriesData[activeCategory];
      const item = category.items.find(i => i.id === itemId);
      if (!item) return;

      currentItemForModal = item;

      // Populate data
      document.getElementById('modal-store-placeholder').innerText = item.logo;
      document.getElementById('modal-discount').innerText = item.discount;
      document.getElementById('modal-title').innerText = item.title;
      document.getElementById('modal-desc').innerText = item.desc;
      document.getElementById('modal-code').innerText = item.code;
      document.getElementById('modal-link').href = "#"; // mockup redirect

      const modal = document.getElementById('coupon-modal');
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
      }, 10);
    }

    function closeModal() {
      const modal = document.getElementById('coupon-modal');
      modal.classList.add('opacity-0');
      setTimeout(() => {
        modal.classList.add('hidden');
        // Reset copy button state
        const copyIcon = document.getElementById('copy-icon');
        copyIcon.setAttribute('data-lucide', 'copy');
        lucide.createIcons();
      }, 300);
    }

    // Clipboard copy action
    function copyCode() {
      if (!currentItemForModal) return;
      
      navigator.clipboard.writeText(currentItemForModal.code).then(() => {
        // Change copy icon to check
        const copyIcon = document.getElementById('copy-icon');
        copyIcon.setAttribute('data-lucide', 'check');
        lucide.createIcons();

        // Show Toast
        const toast = document.getElementById('toast');
        toast.classList.remove('translate-y-20', 'opacity-0');
        setTimeout(() => {
          toast.classList.add('translate-y-20', 'opacity-0');
        }, 2000);
      });
    }

    // Initial load
    window.onload = () => {
      loadCategory('tech');
      lucide.createIcons();
    };
  </script>
</body>
</html>
